# Ethoscraft — self-hosted on Seth's Proxmox cluster via Coolify (Grove @ PVE2).
# Trimmed from upstream's full stack to the two services that matter for a small
# private realm: the game server (client + API + world) and Postgres.
# The optional MediaWiki stack from upstream is intentionally omitted.
#
# Coolify builds the `game` image from ./Dockerfile and routes the public domain
# to it via the SERVICE_FQDN_GAME_8787 magic var (Traefik label injection). The
# `*.sethgholson.com` Cloudflare tunnel wildcard fronts Grove's proxy, so setting
# the FQDN here is the whole exposure story.
services:
  postgres:
    image: postgres:16-alpine
    container_name: ethoscraft-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eastbrook
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify env vars.}
      POSTGRES_DB: eastbrook
    volumes:
      - ethoscraft_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eastbrook -d eastbrook"]
      interval: 5s
      timeout: 3s
      retries: 10

  game:
    build:
      context: .
    container_name: ethoscraft-game
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Coolify magic var: binds https://ethoscraft.sethgholson.com -> this service:8787
      SERVICE_FQDN_GAME_8787: ethoscraft.sethgholson.com
      DATABASE_URL: postgres://eastbrook:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify env vars.}@postgres:5432/eastbrook
      PORT: "8787"
      REALM_NAME: ${REALM_NAME:-Ethoscraft}
      PUBLIC_ORIGIN: https://ethoscraft.sethgholson.com
      # No self-hosted wiki in this trim — point the /wiki redirect back home.
      WIKI_URL: https://ethoscraft.sethgholson.com
      USERNAME_BANLIST: ${USERNAME_BANLIST:-}
      CHAT_CENSOR_LIST: ${CHAT_CENSOR_LIST:-}
      # Anti-bot: cap simultaneous WS per IP. Tiny private realm — keep it sane.
      MAX_WS_PER_IP_HARD: ${MAX_WS_PER_IP_HARD:-20}
    expose:
      - "8787"
    volumes:
      - ethoscraft_media:/app/dist/media

volumes:
  ethoscraft_pgdata:
  ethoscraft_media:
